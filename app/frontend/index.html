<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CinemaAPI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAV -->
<nav>
    <div class="logo">Cinema<span>API</span></div>
    <div class="nav-tabs">
        <button class="nav-tab" onclick="showPage('popular')">Популярные</button>
        <button class="nav-tab" onclick="showPage('search')">Поиск</button>
        <button class="nav-tab" onclick="showPage('watchlist')">Вотчлист</button>
    </div>
    <div class="nav-auth" id="nav-auth">
        <button class="btn btn-ghost" onclick="showPage('auth')">Войти</button>
        <button class="btn btn-primary" onclick="showPage('auth')">Регистрация</button>
    </div>
    <div class="nav-auth" id="nav-user" style="display:none">
        <span style="font-size:13px;color:var(--text-muted)" id="nav-username"></span>
        <button class="btn btn-ghost" onclick="logout()">Выйти</button>
    </div>
</nav>

<!-- AUTH PAGE -->
<div class="page" id="page-auth">
    <div class="auth-container">
        <div class="auth-title">Добро пожаловать</div>
        <div class="auth-subtitle">Войдите или создайте аккаунт</div>
        <div class="auth-toggle">
            <button class="auth-toggle-btn active" id="toggle-login" onclick="switchAuth('login')">Войти</button>
            <button class="auth-toggle-btn" id="toggle-register" onclick="switchAuth('register')">Регистрация</button>
        </div>
        <div class="alert" id="auth-error"></div>

        <div id="login-form">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-input" type="email" id="login-email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input class="form-input" type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="form-btn" onclick="login()">Войти</button>
        </div>

        <div id="register-form" style="display:none">
            <div class="form-group">
                <label class="form-label">Имя пользователя</label>
                <input class="form-input" type="text" id="reg-username" placeholder="username">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-input" type="email" id="reg-email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input class="form-input" type="password" id="reg-password" placeholder="••••••••">
            </div>
            <button class="form-btn" onclick="register()">Создать аккаунт</button>
        </div>
    </div>
</div>

<!-- POPULAR PAGE -->
<div class="page" id="page-popular">
    <div class="page-title">Популярные <span>фильмы</span></div>
    <div class="page-subtitle">Самые просматриваемые прямо сейчас</div>
    <div id="popular-grid" class="movies-grid"></div>
</div>

<!-- SEARCH PAGE -->
<div class="page" id="page-search">
    <div class="page-title">Поиск <span>фильмов</span></div>
    <div class="page-subtitle">Найдите любой фильм по названию</div>
    <div class="search-bar">
        <input class="search-input" type="text" id="search-input" placeholder="Введите название фильма..."
               onkeydown="if(event.key==='Enter')doSearch()">
        <button class="btn btn-primary" onclick="doSearch()">Найти</button>
    </div>
    <div id="search-grid" class="movies-grid"></div>
</div>

<!-- WATCHLIST PAGE -->
<div class="page" id="page-watchlist">
    <div class="page-title">Мой <span>вотчлист</span></div>
    <div class="page-subtitle">Фильмы которые вы отслеживаете</div>
    <div id="watchlist-list"></div>
</div>

<!-- MOVIE MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" id="movie-modal">
        <button class="modal-close" onclick="closeModalBtn()">✕</button>
        <div class="modal-header" id="modal-header"></div>
        <div class="modal-body" id="modal-body"></div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- JS FILES — порядок важен! -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/movies.js"></script>
<script src="js/watchlist.js"></script>
<script src="js/main.js"></script>

</body>
</html>
